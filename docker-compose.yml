services:
  postgres:
    image: postgres:16
    container_name: viareport-db
    environment:
      POSTGRES_DB: via
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: viareport-mq
    ports:
      - "5672:5672"
      - "15672:15672" # painel web de gerenciamento

  api:
    build: .
    container_name: viareport-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/via
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      - postgres
      - rabbitmq

  nginx:
    image: nginx:latest
    container_name: viareport-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: viareport-tunnel
    restart: unless-stopped
    command: tunnel --config /home/nonroot/.cloudflared/config.yml run
    volumes:
      - ./cloudflared:/home/nonroot/.cloudflared
    depends_on:
      - nginx

volumes:
  pgdata: